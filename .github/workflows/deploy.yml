name: Fresh Deploy From Zero

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Upload Public Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # Double check that your folder is lowercase 'public'!

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
