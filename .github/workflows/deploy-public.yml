name: Deploy React Portfolio from Subfolder

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 1. Fixed the deprecation warning by upgrading to Node 22 (the stable Active LTS)
          node-version: 22
          cache: 'npm'
          # 2. Fixed the path error: Using standard workspace environment path syntax
          cache-dependency-path: '${{ github.workspace }}/myPortfolio/package-lock.json'

      - name: Install Dependencies
        # 3. Running explicit inline directory execution to avoid path mismatch conflicts
        run: |
          cd myPortfolio
          npm ci

      - name: Build Project
        run: |
          cd myPortfolio
          npm run build
        env:
          CI: false

      - name: Upload Compiled Build Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: './myPortfolio/build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
