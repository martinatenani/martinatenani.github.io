name: Deploy React Portfolio

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        # FIXED: Removed the 'cd myPortfolio' command entirely
        run: npm ci

      - name: Build Project
        # FIXED: Runs the build straight from the root workspace
        run: npm run build
        env:
          CI: false

      - name: Upload Compiled Build Folder
        uses: actions/upload-pages-artifact@v3
        with:
          # FIXED: Grabs the build folder right from the root directory
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
