name: Deploy React Portfolio from Subfolder

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # This sets the working directory for ALL subsequent execution run steps at once
    defaults:
      run:
        working-directory: myPortfolio

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # FIXED: Removed the leading dot-slash so the absolute repository root path maps cleanly
          cache-dependency-path: myPortfolio/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          CI: false

      - name: Upload Compiled Build Folder
        uses: actions/upload-pages-artifact@v3
        with:
          # FIXED: Absolute reference structure mapping from the checkout root directory
          path: myPortfolio/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
