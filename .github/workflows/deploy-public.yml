name: Deploy React Portfolio from Subfolder

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './myPortfolio/package-lock.json' # Looks inside your folder

      - name: Install Dependencies
        run: npm ci
        working-directory: ./myPortfolio # Steps inside your folder

      - name: Build Project
        run: npm run build
        working-directory: ./myPortfolio # Steps inside your folder
        env:
          CI: false

      - name: Upload Compiled Build Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: './myPortfolio/build' # Grabs the freshly compiled build folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
