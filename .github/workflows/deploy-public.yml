name: Deploy React Portfolio from Subfolder

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          cd myPortfolio
          npm ci

      - name: Build Project
        run: |
          cd myPortfolio
          npm run build
        env:
          CI: false

      - name: Upload Compiled Build Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: './myPortfolio/build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
