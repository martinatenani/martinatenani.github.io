name: Deploy Public Folder to Pages

on:
  push:
    branches: ["main"] # Double check if your branch is "main" or "master"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Upload Public Folder Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This specifies exactly what folder to publish
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
